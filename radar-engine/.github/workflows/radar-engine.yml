name: Radar Engine CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'radar-engine/**'
  pull_request:
    branches:
      - main
    paths:
      - 'radar-engine/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: ./radar-engine
        run: npm ci
        
      - name: Type check
        working-directory: ./radar-engine
        run: npx tsc --noEmit
        
      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem $EC2_USER@$EC2_HOST "
            cd ~/radar-engine && git pull && npm ci && npm run build && pm2 restart radar-engine
          "
          rm private_key.pem