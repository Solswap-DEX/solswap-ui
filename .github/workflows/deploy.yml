name: Deploy SolSwap

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.production
        run: |
          RPC_URL="${{ secrets.RPC_URL }}"
          if [ -z "$RPC_URL" ]; then RPC_URL="https://api.mainnet-beta.solana.com"; fi
          echo "NEXT_PUBLIC_RPC_URL=$RPC_URL" >> .env.production
          
          BIRDEYE_API_KEY="${{ secrets.BIRDEYE_API_KEY }}"
          # No public fallback for Birdeye, but we'll set it anyway
          echo "NEXT_PUBLIC_BIRDEYE_API_KEY=$BIRDEYE_API_KEY" >> .env.production
          
          echo "NEXT_PUBLIC_ONRAMPER_API_KEY=${{ secrets.ONRAMPER_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN }}" >> .env.production
          echo "NEXT_PUBLIC_SITE_URL=https://solswap.cloud" >> .env.production

          # Revenue Configuration
          REFERRER_WALLET="${{ secrets.REFERRER_WALLET }}"
          if [ -z "$REFERRER_WALLET" ]; then REFERRER_WALLET="5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz"; fi
          echo "NEXT_PUBLIC_REFERRER_WALLET=$REFERRER_WALLET" >> .env.production

          FEE_COLLECTOR="${{ secrets.FEE_COLLECTOR }}"
          if [ -z "$FEE_COLLECTOR" ]; then FEE_COLLECTOR="5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz"; fi
          echo "NEXT_PUBLIC_FEE_COLLECTOR=$FEE_COLLECTOR" >> .env.production

          FEE_BPS="${{ secrets.FEE_BPS }}"
          if [ -z "$FEE_BPS" ]; then FEE_BPS="10"; fi
          echo "NEXT_PUBLIC_FEE_BPS=$FEE_BPS" >> .env.production

      - name: Build
        run: npm run build

      - name: Deploy static export (out) to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out"
          target: "/var/www/solswap.cloud/"

      - name: Sync Static Files and Reload Apache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/solswap.cloud
            # Move the new export to the public_html folder
            # We use rsync-like behavior with cp -r if rsync is missing, 
            # or just overwrite.
            rm -rf public_html_old
            mv public_html public_html_old || true
            mkdir public_html
            cp -r out/* public_html/
            
            # Clean up out folder
            rm -rf out
            
            # Graceful reload of Apache to ensure everything is fresh
            # (Though static files usually don't need a reload, it's good practice)
            sudo systemctl reload apache2 || true
            echo "Deploy to public_html completed at $(date)"

      - name: Health Check
        run: |
          sleep 10
          curl -f https://solswap.cloud || exit 1
          echo "solswap.cloud is responding correctly"
