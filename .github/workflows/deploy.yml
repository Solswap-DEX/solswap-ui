name: Deploy SolSwap

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.production
        run: |
          # RPC Configuration (Helius)
          echo "NEXT_PUBLIC_RPC_URL=${{ secrets.NEXT_PUBLIC_RPC_URL }}" \
            >> .env.production
          echo "NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}" \
            >> .env.production
          echo "NEXT_PUBLIC_HELIUS_RPC_URL=${{ secrets.NEXT_PUBLIC_RPC_URL }}" \
            >> .env.production

          # Revenue Configuration
          REFERRER_WALLET="${{ secrets.REFERRER_WALLET }}"
          if [ -z "$REFERRER_WALLET" ]; then
            REFERRER_WALLET="5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz"
          fi
          echo "NEXT_PUBLIC_REFERRER_WALLET=$REFERRER_WALLET" \
            >> .env.production

          FEE_COLLECTOR="${{ secrets.FEE_COLLECTOR }}"
          if [ -z "$FEE_COLLECTOR" ]; then
            FEE_COLLECTOR="5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz"
          fi
          echo "NEXT_PUBLIC_FEE_COLLECTOR=$FEE_COLLECTOR" \
            >> .env.production

          FEE_BPS="${{ secrets.FEE_BPS }}"
          if [ -z "$FEE_BPS" ]; then FEE_BPS="10"; fi
          echo "NEXT_PUBLIC_FEE_BPS=$FEE_BPS" >> .env.production

          # Site
          echo "NEXT_PUBLIC_SITE_URL=https://solswap.cloud" \
            >> .env.production

          # Verify .env.production was created (without showing values)
          echo "=== .env.production keys ==="
          cat .env.production | cut -d'=' -f1

      - name: Verify RPC URL is set
        run: |
          if grep -q "NEXT_PUBLIC_RPC_URL=https://mainnet.helius" \
            .env.production; then
            echo "✅ Helius RPC URL confirmed in .env.production"
          else
            echo "❌ ERROR: Helius RPC URL not found in .env.production"
            exit 1
          fi

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL: ${{ secrets.NEXT_PUBLIC_RPC_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_REFERRER_WALLET: ${{ secrets.REFERRER_WALLET }}
          NEXT_PUBLIC_FEE_COLLECTOR: ${{ secrets.FEE_COLLECTOR }}
          NEXT_PUBLIC_FEE_BPS: ${{ secrets.FEE_BPS }}

      - name: Verify build output exists
        run: |
          if [ -d "out" ]; then
            echo "✅ Build output found in out/"
            ls out/ | head -10
          elif [ -d ".next" ]; then
            echo "✅ Build output found in .next/"
            ls .next/ | head -10
          else
            echo "❌ ERROR: No build output found"
            exit 1
          fi

      - name: Deploy to Apache via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Backup current public_html
            cp -r /var/www/solswap.cloud/public_html \
              /var/www/solswap.cloud/public_html_backup_$(date +%Y%m%d_%H%M%S) \
              2>/dev/null || true

            # Clear public_html for fresh deploy
            rm -rf /var/www/solswap.cloud/public_html/*
            echo "✅ public_html cleared"

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/var/www/solswap.cloud/public_html/"
          strip_components: 1

      - name: Post-deploy verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Files in public_html ==="
            ls /var/www/solswap.cloud/public_html/ | head -20
            echo "=== Apache status ==="
            systemctl is-active apache2
            echo "✅ Deploy completed at $(date)"

      - name: Health check
        run: |
          sleep 20
          curl -f https://solswap.cloud || exit 1
          echo "✅ solswap.cloud is responding"
