name: Deploy SolSwap UI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_ONRAMPER_API_KEY: ${{ secrets.NEXT_PUBLIC_ONRAMPER_API_KEY }}
          NEXT_PUBLIC_GLITCHTIP_DSN: ${{ secrets.NEXT_PUBLIC_GLITCHTIP_DSN }}
          NEXT_PUBLIC_BIRDEYE_API_KEY: ${{ secrets.NEXT_PUBLIC_BIRDEYE_API_KEY }}
          NEXT_PUBLIC_HELIUS_RPC_URL: ${{ secrets.NEXT_PUBLIC_HELIUS_RPC_URL }}
          NEXT_PUBLIC_SITE_URL: https://solswap.cloud

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/solswap.cloud
            git pull origin main
            npm install --ignore-scripts --legacy-peer-deps
            npm run build
            pm2 restart solswap || pm2 start npm --name "solswap" -- start
