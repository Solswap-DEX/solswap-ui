name: Deploy SolSwap UI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_ONRAMPER_API_KEY: ${{ secrets.NEXT_PUBLIC_ONRAMPER_API_KEY }}
          NEXT_PUBLIC_GLITCHTIP_DSN: ${{ secrets.NEXT_PUBLIC_GLITCHTIP_DSN }}
          NEXT_PUBLIC_BIRDEYE_API_KEY: ${{ secrets.NEXT_PUBLIC_BIRDEYE_API_KEY }}
          NEXT_PUBLIC_HELIUS_RPC_URL: ${{ secrets.NEXT_PUBLIC_HELIUS_RPC_URL }}
          NEXT_PUBLIC_SITE_URL: https://solswap.cloud

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static files to server
        run: |
          # Create a tar of the out directory and transfer via SSH
          cd out
          tar czf /tmp/solswap-build.tar.gz .
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/solswap-build.tar.gz \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/tmp/solswap-build.tar.gz
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "rm -rf /var/www/solswap.cloud/public_html/* && tar xzf /tmp/solswap-build.tar.gz -C /var/www/solswap.cloud/public_html/ && rm /tmp/solswap-build.tar.gz && echo 'Deploy successful'"
