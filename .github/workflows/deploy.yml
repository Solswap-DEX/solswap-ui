name: Deploy SolSwap UI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_ONRAMPER_API_KEY: ${{ secrets.NEXT_PUBLIC_ONRAMPER_API_KEY }}
          NEXT_PUBLIC_GLITCHTIP_DSN: ${{ secrets.NEXT_PUBLIC_GLITCHTIP_DSN }}
          NEXT_PUBLIC_BIRDEYE_API_KEY: ${{ secrets.NEXT_PUBLIC_BIRDEYE_API_KEY }}
          NEXT_PUBLIC_HELIUS_RPC_URL: ${{ secrets.NEXT_PUBLIC_HELIUS_RPC_URL }}
          NEXT_PUBLIC_SITE_URL: https://solswap.cloud

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: solswap.cloud
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # We assume the server pulls the latest code and we build locally or we sync
            # Since the user wants the build in GH Actions, we will use a pull strategy for now
            # but ideally we'd scp the 'out' folder.
            cd /var/www/solswap.cloud
            git pull origin main
            npm ci
            npm run build
            # If using static export, Apache will serve from 'out'
            # If using next start, we restart pm2
            pm2 restart solswap || pm2 start npm --name "solswap" -- start
