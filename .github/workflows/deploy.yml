name: Deploy SolSwap

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.production
        run: |
          echo "NEXT_PUBLIC_RPC_URL=${{ secrets.RPC_URL }}" >> .env.production
          echo "NEXT_PUBLIC_BIRDEYE_API_KEY=${{ secrets.BIRDEYE_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_ONRAMPER_API_KEY=${{ secrets.ONRAMPER_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN }}" >> .env.production
          echo "NEXT_PUBLIC_SITE_URL=https://solswap.cloud" >> .env.production

      - name: Build
        run: npm run build

      - name: Deploy .next to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next"
          target: "/var/www/solswap.cloud/"

      - name: Deploy .env to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env.production"
          target: "/var/www/solswap.cloud/"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/solswap.cloud
            # Ensure dependencies are installed
            npm install --legacy-peer-deps --production
            pm2 restart solswap || pm2 start npm --name "solswap" -- start
            echo "Deploy completed at $(date)"

      - name: Health Check
        run: |
          sleep 15
          curl -f https://solswap.cloud || exit 1
          echo "solswap.cloud is responding correctly"
