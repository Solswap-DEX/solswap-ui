name: Deploy SolSwap

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          NEXT_PUBLIC_RPC_URL: ${{ secrets.RPC_URL }}
          NEXT_PUBLIC_HELIUS_RPC_URL: ${{ secrets.HELIUS_RPC_URL }}
          NEXT_PUBLIC_BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
          NEXT_PUBLIC_ONRAMPER_API_KEY: ${{ secrets.ONRAMPER_API_KEY }}
          NEXT_PUBLIC_GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.SITE_URL }}
          NEXT_PUBLIC_REFERRER_WALLET: ${{ secrets.REFERRER_WALLET }}
          NEXT_PUBLIC_FEE_COLLECTOR: ${{ secrets.FEE_COLLECTOR }}
          NEXT_PUBLIC_FEE_BPS: ${{ secrets.FEE_BPS }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.WS_URL }}
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ -d "out" ]; then
            echo "✅ Build output found in out/"
            ls out/ | head -10
          elif [ -d ".next" ]; then
            echo "✅ Build output found in .next/"
            ls .next/ | head -10
          else
            echo "❌ ERROR: No build output found"
            exit 1
          fi

      - name: Deploy to Apache via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          timeout: 15m
          script: |
            # Backup current public_html
            cp -r /var/www/solswap.cloud/public_html \
              /var/www/solswap.cloud/public_html_backup_$(date +%Y%m%d_%H%M%S) \
              2>/dev/null || true

            # Clear public_html for fresh deploy
            rm -rf /var/www/solswap.cloud/public_html/*
            echo "✅ public_html cleared"

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*"
          target: "/var/www/solswap.cloud/public_html/"
          strip_components: 1
          timeout: 15m
          command_timeout: 15m

      - name: Post-deploy verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          timeout: 10m
          script: |
            echo "=== Files in public_html ==="
            ls /var/www/solswap.cloud/public_html/ | head -20
            echo "=== Apache status ==="
            systemctl is-active apache2
            echo "✅ Deploy completed at $(date)"

      - name: Health check
        run: |
          sleep 20
          curl -f https://solswap.cloud || exit 1
          echo "✅ solswap.cloud is responding"
